name: codexx-release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  prepare:
    name: prepare
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
    steps:
      - name: Resolve tag and release settings
        id: meta
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            checkout_ref="refs/tags/${tag}"
          else
            tag="${GITHUB_REF_NAME}"
            checkout_ref="${GITHUB_REF}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Unsupported tag format: $tag" >&2
            exit 1
          fi

          version="${tag#v}"
          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"

  linux-x86_64:
    name: linux-x86_64
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          persist-credentials: false

      - name: Build codexx
        run: |
          set -euo pipefail
          scripts/bootstrap-build-env.sh
          scripts/build-codexx.sh --release

      - name: Package artifact
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/package
          cp build/codexx dist/package/codexx
          tar -C dist/package -czf dist/codexx-x86_64-unknown-linux-gnu.tar.gz codexx

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codexx-x86_64-unknown-linux-gnu
          path: dist/codexx-x86_64-unknown-linux-gnu.tar.gz
          if-no-files-found: error

  macos-arm64:
    name: macos-arm64
    needs: prepare
    runs-on: macos-14
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          persist-credentials: false

      - name: Build codexx
        run: |
          set -euo pipefail
          scripts/bootstrap-build-env.sh
          scripts/build-codexx.sh --release

      - name: Package artifact
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/package
          cp build/codexx dist/package/codexx
          tar -C dist/package -czf dist/codexx-aarch64-apple-darwin.tar.gz codexx

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codexx-aarch64-apple-darwin
          path: dist/codexx-aarch64-apple-darwin.tar.gz
          if-no-files-found: error

  windows-x86_64:
    name: windows-x86_64
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build codexx
        working-directory: codex-rs
        run: |
          set -euo pipefail
          cargo build -p codex-cli --bin codex --release --target x86_64-pc-windows-msvc

      - name: Package artifact
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path dist\package | Out-Null
          Copy-Item "codex-rs\target\x86_64-pc-windows-msvc\release\codex.exe" "dist\package\codexx.exe"
          Compress-Archive -Path "dist\package\codexx.exe" -DestinationPath "dist\codexx-x86_64-pc-windows-msvc.zip"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codexx-x86_64-pc-windows-msvc
          path: dist/codexx-x86_64-pc-windows-msvc.zip
          if-no-files-found: error

  publish:
    name: publish
    if: always()
    needs:
      - prepare
      - linux-x86_64
      - macos-arm64
      - windows-x86_64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/release
          merge-multiple: true

      - name: Show collected assets
        run: find dist/release -type f | sort

      - name: Detect available assets
        id: assets
        run: |
          if find dist/release -type f | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate checksums
        if: ${{ steps.assets.outputs.has_files == 'true' }}
        run: |
          set -euo pipefail
          (
            cd dist/release
            sha256sum * > SHA256SUMS
          )

      - name: Generate release body
        if: ${{ steps.assets.outputs.has_files == 'true' }}
        env:
          TARGET_TAG: ${{ needs.prepare.outputs.tag }}
          OUTPUT_FILE: dist/release-body.md
        run: bash ./scripts/generate_release_body.sh

      - name: Publish release
        if: ${{ steps.assets.outputs.has_files == 'true' }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: codexx ${{ needs.prepare.outputs.version }}
          body_path: dist/release-body.md
          files: dist/release/**/*
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
