name: codexx-release

on:
  push:
    tags:
      - "codexx-v*.*.*"
      - "codexx-v*.*.*-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example codexx-v0.1.0"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
    steps:
      - name: Resolve tag and release settings
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            checkout_ref="${GITHUB_SHA}"
          else
            tag="${GITHUB_REF_NAME}"
            checkout_ref="${GITHUB_REF}"
          fi

          if [[ ! "$tag" =~ ^codexx-v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Unsupported tag format: $tag" >&2
            exit 1
          fi

          version="${tag#codexx-v}"
          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive_name: codexx-x86_64-unknown-linux-gnu.tar.gz
            artifact_name: codexx-linux-x86_64
          - label: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            archive_name: codexx-aarch64-apple-darwin.tar.gz
            artifact_name: codexx-macos-arm64
          - label: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: codexx-x86_64-pc-windows-msvc.zip
            artifact_name: codexx-windows-x86_64
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          persist-credentials: false

      - name: Build codexx on Linux and macOS
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: |
          set -euo pipefail
          scripts/bootstrap-build-env.sh
          scripts/build-codexx.sh --release

      - name: Install Rust toolchain on Windows
        if: ${{ runner.os == 'Windows' }}
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}

      - name: Build codexx on Windows
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        working-directory: codex-rs
        run: |
          set -euo pipefail
          cargo build -p codex-cli --bin codex --release --target "${{ matrix.target }}"

      - name: Package Linux and macOS artifact
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/package
          cp build/codexx dist/package/codexx
          tar -C dist/package -czf "dist/${{ matrix.archive_name }}" codexx

      - name: Package Windows artifact
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path dist\package | Out-Null
          Copy-Item "codex-rs\target\${{ matrix.target }}\release\codex.exe" "dist\package\codexx.exe"
          Compress-Archive -Path "dist\package\codexx.exe" -DestinationPath "dist\${{ matrix.archive_name }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist

      - name: Flatten release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find dist -maxdepth 2 -type f -exec cp {} release-assets/ \;
          ls -lh release-assets

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          (
            cd release-assets
            sha256sum * > SHA256SUMS
          )

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          Automated release for codexx ${{ needs.prepare.outputs.version }}.

          Included assets:
          - codexx-x86_64-unknown-linux-gnu.tar.gz
          - codexx-aarch64-apple-darwin.tar.gz
          - codexx-x86_64-pc-windows-msvc.zip
          - SHA256SUMS
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: codexx ${{ needs.prepare.outputs.version }}
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          files: release-assets/*
