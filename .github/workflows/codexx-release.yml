name: codexx-release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  CODEXX_RELEASE_REPO: ${{ github.repository }}

jobs:
  prepare:
    name: prepare
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
    steps:
      - name: Resolve tag and release settings
        id: meta
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            checkout_ref="refs/tags/${tag}"
          else
            tag="${GITHUB_REF_NAME}"
            checkout_ref="${GITHUB_REF}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Unsupported tag format: $tag" >&2
            exit 1
          fi

          version="${tag#v}"
          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"

  linux:
    name: linux-${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            arch: amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
      CODEXX_GIT_SHA: ${{ github.sha }}
      CODEXX_SKIP_RUSTUP_SYNC: "1"
      CODEXX_BOOTSTRAP_SKIP_DEV_TOOLS: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/codexx/sccache
          key: codexx-release-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('codex-rs/Cargo.lock', 'codex-rs/rust-toolchain.toml') }}
          restore-keys: |
            codexx-release-${{ runner.os }}-${{ matrix.target }}-

      - name: Build codexx
        run: |
          set -euo pipefail
          scripts/bootstrap-build-env.sh
          scripts/build-codexx-release.sh

      - name: Package Linux artifacts
        run: |
          set -euo pipefail

          asset_stem="codexx-linux-${{ matrix.arch }}"
          version_file="dist/${asset_stem}.version.txt"
          package_dir="dist/package"

          rm -rf dist
          mkdir -p "$package_dir"

          cp build/codexx "dist/${asset_stem}"

          cat > "$version_file" <<EOF
          name=CodexX
          version=${{ needs.prepare.outputs.version }}
          commit=${{ github.sha }}
          short_commit=${GITHUB_SHA:0:7}
          profile=release
          platform=linux
          arch=${{ matrix.arch }}
          artifact=${asset_stem}
          built_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

          cp "$version_file" "$package_dir/codexx.version.txt"
          cp build/codexx "$package_dir/codexx"

          tar -C "$package_dir" -czf "dist/${asset_stem}.tar.gz" codexx codexx.version.txt
          (cd "$package_dir" && zip -qr "../${asset_stem}.zip" codexx codexx.version.txt)

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codexx-linux-${{ matrix.arch }}
          path: |
            dist/codexx-linux-${{ matrix.arch }}
            dist/codexx-linux-${{ matrix.arch }}.tar.gz
            dist/codexx-linux-${{ matrix.arch }}.zip
            dist/codexx-linux-${{ matrix.arch }}.version.txt
          if-no-files-found: error

  macos:
    name: macos-${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            arch: amd64
          - runner: macos-15
            target: aarch64-apple-darwin
            arch: arm64
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
      CODEXX_GIT_SHA: ${{ github.sha }}
      CODEXX_SKIP_RUSTUP_SYNC: "1"
      CODEXX_BOOTSTRAP_SKIP_DEV_TOOLS: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/codexx/sccache
          key: codexx-release-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('codex-rs/Cargo.lock', 'codex-rs/rust-toolchain.toml') }}
          restore-keys: |
            codexx-release-${{ runner.os }}-${{ matrix.target }}-

      - name: Build codexx
        run: |
          set -euo pipefail
          scripts/bootstrap-build-env.sh
          scripts/build-codexx-release.sh

      - name: Package macOS dmg
        run: |
          set -euo pipefail

          asset_stem="codexx-darwin-${{ matrix.arch }}"
          version_file="dist/${asset_stem}.version.txt"
          package_dir="$(mktemp -d "${RUNNER_TEMP:-/tmp}/codexx-dmg.XXXXXX")"

          rm -rf dist
          mkdir -p dist
          mkdir -p "$package_dir/payload"

          cat > "$version_file" <<EOF
          name=CodexX
          version=${{ needs.prepare.outputs.version }}
          commit=${{ github.sha }}
          short_commit=${GITHUB_SHA:0:7}
          profile=release
          platform=darwin
          arch=${{ matrix.arch }}
          artifact=${asset_stem}.dmg
          built_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

          cp build/codexx "$package_dir/payload/codexx"
          cp "$version_file" "$package_dir/payload/codexx.version.txt"
          chmod 755 "$package_dir/payload/codexx"

          hdiutil create \
            -volname "CodexX" \
            -srcfolder "$package_dir/payload" \
            -ov \
            -format UDZO \
            "dist/${asset_stem}.dmg"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codexx-darwin-${{ matrix.arch }}
          path: |
            dist/codexx-darwin-${{ matrix.arch }}.dmg
            dist/codexx-darwin-${{ matrix.arch }}.version.txt
          if-no-files-found: error

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codexx-darwin-${{ matrix.arch }}-bin
          path: build/codexx
          if-no-files-found: error

  macos-universal:
    name: macos-universal
    needs:
      - prepare
      - macos
    runs-on: macos-15
    timeout-minutes: 90
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
      CODEXX_GIT_SHA: ${{ github.sha }}
      CODEXX_SKIP_RUSTUP_SYNC: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: codexx-darwin-amd64-bin
          path: universal-inputs/amd64

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: codexx-darwin-arm64-bin
          path: universal-inputs/arm64

      - name: Prepare universal inputs
        run: |
          set -euo pipefail
          test -f universal-inputs/amd64/codexx
          test -f universal-inputs/arm64/codexx

      - name: Build universal macOS dmg
        run: |
          set -euo pipefail

          asset_stem="codexx-darwin-universal"
          version_file="dist/${asset_stem}.version.txt"
          package_dir="$(mktemp -d "${RUNNER_TEMP:-/tmp}/codexx-universal.XXXXXX")"

          rm -rf dist
          mkdir -p dist
          mkdir -p "$package_dir/payload"

          lipo -create \
            universal-inputs/amd64/codexx \
            universal-inputs/arm64/codexx \
            -output "$package_dir/payload/codexx"
          chmod 755 "$package_dir/payload/codexx"

          cat > "$version_file" <<EOF
          name=CodexX
          version=${{ needs.prepare.outputs.version }}
          commit=${{ github.sha }}
          short_commit=${GITHUB_SHA:0:7}
          profile=release
          platform=darwin
          arch=universal
          artifact=${asset_stem}.dmg
          built_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

          cp "$version_file" "$package_dir/payload/codexx.version.txt"
          hdiutil create \
            -volname "CodexX" \
            -srcfolder "$package_dir/payload" \
            -ov \
            -format UDZO \
            "dist/${asset_stem}.dmg"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codexx-darwin-universal
          path: |
            dist/codexx-darwin-universal.dmg
            dist/codexx-darwin-universal.version.txt
          if-no-files-found: error

  windows:
    name: windows-${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            arch: amd64
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            arch: arm64
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
      CODEXX_GIT_SHA: ${{ github.sha }}
      CODEXX_RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      CODEXX_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      CODEXX_RELEASE_ARCH: ${{ matrix.arch }}
      CODEXX_RELEASE_COMMIT: ${{ github.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: codexx-release-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('codex-rs/Cargo.lock', 'codex-rs/rust-toolchain.toml') }}
          restore-keys: |
            codexx-release-${{ runner.os }}-${{ matrix.target }}-

      - name: Build codexx
        working-directory: codex-rs
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p codex-cli --bin codex --release --target "${{ matrix.target }}"

      - name: Package Windows release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest

          $repo = $env:CODEXX_RELEASE_REPO
          $tag = $env:CODEXX_RELEASE_TAG
          $version = $env:CODEXX_RELEASE_VERSION
          $arch = $env:CODEXX_RELEASE_ARCH
          $assetStem = "codexx-windows-$arch"
          $target = "${{ matrix.target }}"
          $sourceBinary = Join-Path "codex-rs/target/$target/release" "codex.exe"
          $releaseDir = "dist"
          $installExe = Join-Path $releaseDir "${assetStem}-install.exe"
          $binaryOut = Join-Path $releaseDir "${assetStem}.exe"
          $versionOut = Join-Path $releaseDir "${assetStem}.version.txt"

          Remove-Item -Recurse -Force $releaseDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          Copy-Item $sourceBinary $binaryOut
          @"
          name=CodexX
          version=$version
          commit=$env:GITHUB_SHA
          short_commit=$($env:GITHUB_SHA.Substring(0, 7))
          profile=release
          platform=windows
          arch=$arch
          artifact=${assetStem}.exe
          built_at=$([DateTime]::UtcNow.ToString("yyyy-MM-ddTHH:mm:ssZ"))
          "@ | Set-Content -Path $versionOut -Encoding utf8

          Copy-Item "scripts/windows-install-bootstrap.ps1" (Join-Path $env:RUNNER_TEMP "codexx-install.ps1")
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module ps2exe -Scope CurrentUser -Force -AllowClobber
          Import-Module ps2exe
          Invoke-PS2EXE -InputFile (Join-Path $env:RUNNER_TEMP "codexx-install.ps1") -OutputFile $installExe -NoConsole -Title "CodexX Installer"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codexx-windows-${{ matrix.arch }}
          path: |
            dist/codexx-windows-${{ matrix.arch }}.exe
            dist/codexx-windows-${{ matrix.arch }}-install.exe
            dist/codexx-windows-${{ matrix.arch }}.version.txt
          if-no-files-found: error

  publish:
    name: publish
    if: always()
    needs:
      - prepare
      - linux
      - macos
      - macos-universal
      - windows
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/release
          merge-multiple: true

      - name: Show collected assets
        run: find dist/release -type f | sort

      - name: Detect available assets
        id: assets
        run: |
          if find dist/release -type f | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate checksums
        if: ${{ steps.assets.outputs.has_files == 'true' }}
        run: |
          set -euo pipefail
          (
            cd dist/release
            sha256sum * > SHA256SUMS
          )

      - name: Generate release body
        if: ${{ steps.assets.outputs.has_files == 'true' }}
        env:
          TARGET_TAG: ${{ needs.prepare.outputs.tag }}
          OUTPUT_FILE: dist/release-body.md
        run: bash ./scripts/generate_release_body.sh

      - name: Publish release
        if: ${{ steps.assets.outputs.has_files == 'true' }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: codexx ${{ needs.prepare.outputs.version }}
          body_path: dist/release-body.md
          files: dist/release/**/*
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
